{{- if .Values.autoscaling.web.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "camap.fullname" . }}-web
  labels:
    {{- include "camap.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "camap.fullname" . }}-web
  minReplicas: {{ .Values.autoscaling.web.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.web.maxReplicas }}
  {{- with .Values.autoscaling.web.behavior }}
  behavior:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  metrics:
    {{- with .Values.autoscaling.web.memory }}
    - type: Resource
      resource:
        name: memory
        target:
          type: {{ .type }}
          {{- if eq .type "Utilization" }}
          averageUtilization: {{ .averageUtilization }}
          {{- else if eq .type "AverageValue" }}
          averageValue: {{ .averageValue | quote }}
          {{- else }}
          {{- fail "autoscaling.web.memory.type must be either 'Utilization' or 'AverageValue'" }}
          {{- end }}
    {{- end }}
{{- end }}