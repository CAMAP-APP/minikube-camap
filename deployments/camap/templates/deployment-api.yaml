apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "camap.fullname" . }}-api
  labels:
    {{- include "camap.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "camap.name" . }}
      app.kubernetes.io/component: api

  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "camap.name" . }}
        app.kubernetes.io/component: api
      annotations:
        reloader.stakater.com/auto: "true"             

    spec:
      {{- with .Values.hostAliases }}
      hostAliases:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      initContainers:
        - name: render-env
          image: alpine:3.20
          command:
            - /bin/sh
            - -ec
            - |
              apk add --no-cache gettext
              mkdir -p /work
              envsubst < /templates/camapts.env.tpl > /work/camapts.env
          env:
            - name: DB_HOST
              value: {{ .Values.camapConfig.dbHost | quote }}
            - name: DB_PORT
              value: {{ .Values.camapConfig.dbPort | quote }}

            - name: DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mysql.existingSecret }}
                  key: mysql-database

            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mysql.existingSecret }}
                  key: mysql-username

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mysql.existingSecret }}
                  key: mysql-password

            - name: SMTP_HOST
              value: {{ .Values.camapConfig.smtpHost | quote }}
            - name: SMTP_PORT
              value: {{ .Values.camapConfig.smtpPort | quote }}
            - name: SMTP_SECURE
              value: {{ .Values.camapConfig.smtpSecure | quote }}
            - name: SMTP_TLS_SERVERNAME
              value: {{ .Values.camapConfig.smtpTlsServername | quote }}

            - name: CAMAP_HOST
              value: {{ .Values.camapConfig.camapHost | quote }}
            - name: CAMAP_LOCAL_HOST
              value: {{ .Values.camapConfig.camapLocalHost | quote }}
            - name: CAMAP_BRIDGE_API
              value: {{ .Values.camapConfig.camapBridgeApi | quote }}

            - name: FRONT_URL
              value: {{ .Values.camapConfig.camapApiUrl | quote }}

            - name: HX_TRIGGER_CRONS
              value: {{ .Values.camapConfig.hxTriggerCrons | quote }}

            - name: THEME_ID
              value: {{ .Values.camapConfig.themeId | quote }}

            - name: MAPBOX_KEY
              value: {{ .Values.camapConfig.mapboxKey | quote }}

            - name: DISABLE_BRUTE_FORCE
              value: {{ .Values.camapConfig.disableBruteForce | quote }}  

          envFrom:
            - secretRef:
                name: {{ .Values.runtimeSecrets.existingSecret }}

          volumeMounts:
            - name: templates
              mountPath: /templates
            - name: rendered
              mountPath: /work

      containers:
        - name: api
          image: "{{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}"
          imagePullPolicy: {{ .Values.image.api.pullPolicy }}

          env:
            - name: TZ
              value: "Europe/Paris"

          ports:
            - containerPort: 3010
              name: http

          volumeMounts:
            - name: rendered
              mountPath: /srv/.env
              subPath: camapts.env

          startupProbe:
            httpGet:
              path: /health
              port: 3010
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18

          readinessProbe:
            httpGet:
              path: /health
              port: 3010
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /health
              port: 3010
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6

          resources:
            {{- toYaml .Values.resources.api | nindent 12 }}

      volumes:
        - name: templates
          configMap:
            name: {{ include "camap.fullname" . }}-config
            items:
              - key: camapts.env.tpl
                path: camapts.env.tpl

        - name: rendered
          emptyDir: {}