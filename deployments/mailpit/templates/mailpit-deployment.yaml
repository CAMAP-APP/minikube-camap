apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailpit
  labels:
    app: mailpit
spec:
  replicas: {{ .Values.mailpit.replicaCount }}
  selector:
    matchLabels:
      app: mailpit
  template:
    metadata:
      labels:
        app: mailpit
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: mailpit
          image: "{{ .Values.mailpit.image.repository }}:{{ .Values.mailpit.image.tag }}"
          imagePullPolicy: {{ .Values.mailpit.image.pullPolicy }}
          ports:
            - name: smtp
              containerPort: 1025
            - name: http
              containerPort: 8025
          env:
            - name: MP_SMTP_BIND_ADDR
              value: "0.0.0.0:1025"
            - name: MP_UI_BIND_ADDR
              value: "0.0.0.0:8025"
            - name: MP_MAX_AGE
              value: {{ .Values.mailpit.config.maxAge | quote }}
            - name: MP_MAX_MESSAGES
              value: {{ .Values.mailpit.config.maxMessages | quote }}
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
{{ toYaml .Values.mailpit.resources | indent 12 }}
