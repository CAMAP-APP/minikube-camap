apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: camap
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  project: default
  source:
    repoURL: https://github.com/CAMAP-APP/minikube-camap.git
    targetRevision: refs/heads/main
    path: deployments/camap
  destination:
    server: https://kubernetes.default.svc
    namespace: camap
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
