apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mailpit
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "25"
  labels:
    app.kubernetes.io/name: mailpit
spec:
  project: default

  source:
    repoURL: https://github.com/CAMAP-APP/minikube-camap.git
    targetRevision: refs/heads/main
    path: deployments/mailpit
    helm:
      releaseName: mailpit

  destination:
    server: https://kubernetes.default.svc
    namespace: mailpit

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
